<!-- ====================== SOCIAL PROOF TOAST - VERSIÓN CORREGIDA Y OPTIMIZADA ====================== -->
<div id="social-proof-toast" style="
    position: fixed !important; bottom: 25px !important; left: 25px !important;
    background-color: #0f0f12 !important; border: 2px solid #c9a84c !important;
    padding: 16px 20px !important; display: none; align-items: center !important;
    gap: 14px !important; z-index: 9999999 !important; font-family: 'Inter', system-ui, sans-serif !important;
    border-radius: 8px !important; box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
    max-width: 340px !important; transition: all 0.4s ease !important;
">
    <img id="toast-flag" src="" width="28" style="border-radius:4px; border:1px solid #555; display:none;">
    <div>
        <strong id="toast-user" style="color:#c9a84c; font-size:15px; font-weight:800; display:block;"></strong>
        <span id="toast-action" style="color:#ffffff; font-size:13.5px; line-height:1.4;"></span>
    </div>
</div>

<script>
// ====================== TOAST SOCIAL PROOF (100% FUNCIONAL) ======================
(function() {
    let popupVisible = false;

    async function checkKuroFlowActivity() {
        if (popupVisible) return;

        try {
            const res = await fetch('https://kuroflow-license-server.onrender.com/activity');
            const data = await res.json();

            if (data && data.user && data.status === "ok") {
                const toast = document.getElementById('social-proof-toast');
                const userEl = document.getElementById('toast-user');
                const actionEl = document.getElementById('toast-action');
                const flagEl = document.getElementById('toast-flag');

                userEl.textContent = data.user;
                actionEl.innerHTML = `${data.action} <span style="opacity:0.65">• ${data.time_ago || 'recently'}</span>`;

                const countryCode = (data.country && data.country !== "un") ? data.country.toLowerCase() : "us";
                flagEl.src = `https://flagcdn.com/w40/${countryCode}.png`;
                flagEl.style.display = 'block';

                toast.style.display = 'flex';
                setTimeout(() => { toast.style.opacity = '1'; }, 80);

                popupVisible = true;

                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        toast.style.display = 'none';
                        popupVisible = false;
                    }, 500);
                }, 8200);
            }
        } catch (e) {
            // console.log("Waiting for activity...");
        }
    }

    // Primera aparición después de cargar
    setTimeout(checkKuroFlowActivity, 8500);

    // Luego cada ~17 segundos con algo de aleatoriedad
    setInterval(() => {
        if (Math.random() > 0.28) checkKuroFlowActivity();
    }, 17000);
})();
  
<script>
async function requestTrial() {
    const emailField = document.getElementById('trial-email');
    if (!emailField) return;
    
    const email = emailField.value.trim();
    const msg = document.getElementById('trial-msg');
    const btn = document.getElementById('trial-btn');

    if (!email.includes('@')) {
        msg.style.display = 'block';
        msg.style.color = '#ed6e6e';
        msg.textContent = 'Please enter a valid email address.';
        return;
    }

    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
        const res = await fetch('https://kuroflow-license-server.onrender.com/trial', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        if (res.ok) {
            msg.style.display = 'block';
            msg.style.color = '#6edd9e';
            msg.textContent = '✅ Trial key sent! Check your inbox.';
            
            // Lógica del nombre para el Pop-up
            const nameRaw = email.split('@')[0];
            const nameClean = nameRaw.charAt(0).toUpperCase() + nameRaw.slice(1);
            
            const toast = document.getElementById('social-proof-toast');
            if (toast) {
                document.getElementById('toast-user').textContent = nameClean;
                document.getElementById('toast-action').innerHTML = `requested a 7-day trial <span style="opacity:0.65">• just now</span>`;
                document.getElementById('toast-flag').style.display = 'block';
                toast.style.display = 'flex';
                setTimeout(() => { toast.style.opacity = '1'; }, 100);
            }
        }
    } catch (e) {
        msg.style.display = 'block';
        msg.textContent = 'Connection error. Try again.';
    } finally {
        btn.textContent = 'Get Trial Key →';
        btn.disabled = false;
    }
}
  
</script>

  <script>

// 1. GAUGE ANIMATION (Indicador de Win-Rate/Performance)
function updateGauge(value) {
    const gaugeFill = document.querySelector('.gauge-fill');
    if (!gaugeFill) return;
    
    const radius = 90;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference - (value / 100) * circumference;
    
    gaugeFill.style.strokeDashoffset = offset;
    
    const countTarget = document.getElementById('gauge-value');
    if (countTarget) {
        let start = 0;
        const duration = 2000;
        const increment = value / (duration / 16);
        
        const timer = setInterval(() => {
            start += increment;
            if (start >= value) {
                countTarget.textContent = value.toFixed(1) + '%';
                clearInterval(timer);
            } else {
                countTarget.textContent = start.toFixed(1) + '%';
            }
        }, 16);
    }
}

// 2. FAQ ACCORDION
function toggleFaq(element) {
    const allFaqs = document.querySelectorAll('.faq-item');
    const content = element.nextElementSibling;
    const icon = element.querySelector('.faq-icon');

    allFaqs.forEach(item => {
        const otherContent = item.querySelector('.faq-answer');
        const otherIcon = item.querySelector('.faq-icon');
        if (otherContent && otherContent !== content && otherContent.style.maxHeight) {
            otherContent.style.maxHeight = null;
            item.classList.remove('active');
            if (otherIcon) otherIcon.style.transform = 'rotate(0deg)';
        }
    });

    if (content.style.maxHeight) {
        content.style.maxHeight = null;
        element.parentElement.classList.remove('active');
        if (icon) icon.style.transform = 'rotate(0deg)';
    } else {
        content.style.maxHeight = content.scrollHeight + "px";
        element.parentElement.classList.add('active');
        if (icon) icon.style.transform = 'rotate(45deg)';
    }
}

// 3. LIGHTBOX PARA PROOF
function openLightbox(src) {
    const lightbox = document.getElementById('proof-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    if (!lightbox || !lightboxImg) return;

    lightboxImg.src = src;
    lightbox.style.display = 'flex';
    setTimeout(() => { lightbox.style.opacity = '1'; }, 10);
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    const lightbox = document.getElementById('proof-lightbox');
    if (!lightbox) return;

    lightbox.style.opacity = '0';
    setTimeout(() => {
        lightbox.style.display = 'none';
        document.body.style.overflow = 'auto';
    }, 300);
}

// 4. SCROLL REVEAL
const revealOnScroll = () => {
    const elements = document.querySelectorAll('.reveal');
    const windowHeight = window.innerHeight;

    elements.forEach(el => {
        const elementTop = el.getBoundingClientRect().top;
        if (elementTop < windowHeight - 150) {
            el.classList.add('active');
        }
    });
};

// 5. NAVBAR STICKY
window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    if (nav) {
        window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
    }
    revealOnScroll();
});

// INITIALIZATION
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => updateGauge(78.4), 1000);
    revealOnScroll();
    console.log("Kuro-Flow Engine: Fully Restored.");
});
</script>
