<!-- ====================== SOCIAL PROOF TOAST - VERSIÓN CORREGIDA Y OPTIMIZADA ====================== -->
<div id="social-proof-toast" style="
    position: fixed !important; bottom: 25px !important; left: 25px !important;
    background-color: #0f0f12 !important; border: 2px solid #c9a84c !important;
    padding: 16px 20px !important; display: none; align-items: center !important;
    gap: 14px !important; z-index: 9999999 !important; font-family: 'Inter', system-ui, sans-serif !important;
    border-radius: 8px !important; box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
    max-width: 340px !important; transition: all 0.4s ease !important;
">
    <img id="toast-flag" src="" width="28" style="border-radius:4px; border:1px solid #555; display:none;">
    <div>
        <strong id="toast-user" style="color:#c9a84c; font-size:15px; font-weight:800; display:block;"></strong>
        <span id="toast-action" style="color:#ffffff; font-size:13.5px; line-height:1.4;"></span>
    </div>
</div>

<script>
// ====================== TOAST SOCIAL PROOF (100% FUNCIONAL) ======================
(function() {
    let popupVisible = false;

    async function checkKuroFlowActivity() {
        if (popupVisible) return;

        try {
            const res = await fetch('https://kuroflow-license-server.onrender.com/activity');
            const data = await res.json();

            if (data && data.user && data.status === "ok") {
                const toast = document.getElementById('social-proof-toast');
                const userEl = document.getElementById('toast-user');
                const actionEl = document.getElementById('toast-action');
                const flagEl = document.getElementById('toast-flag');

                userEl.textContent = data.user;
                actionEl.innerHTML = `${data.action} <span style="opacity:0.65">• ${data.time_ago || 'recently'}</span>`;

                const countryCode = (data.country && data.country !== "un") ? data.country.toLowerCase() : "us";
                flagEl.src = `https://flagcdn.com/w40/${countryCode}.png`;
                flagEl.style.display = 'block';

                toast.style.display = 'flex';
                setTimeout(() => { toast.style.opacity = '1'; }, 80);

                popupVisible = true;

                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        toast.style.display = 'none';
                        popupVisible = false;
                    }, 500);
                }, 8200);
            }
        } catch (e) {
            // console.log("Waiting for activity...");
        }
    }

    // Primera aparición después de cargar
    setTimeout(checkKuroFlowActivity, 8500);

    // Luego cada ~17 segundos con algo de aleatoriedad
    setInterval(() => {
        if (Math.random() > 0.28) checkKuroFlowActivity();
    }, 17000);
})();
</script>

<!-- Función requestTrial mejorada (también activa el toast) -->
<script>
async function requestTrial() {
    const email = document.getElementById('trial-email').value.trim();
    const msg = document.getElementById('trial-msg');
    const btn = document.getElementById('trial-btn');

    if (!email.includes('@')) {
        msg.style.display = 'block';
        msg.style.color = '#ed6e6e';
        msg.textContent = 'Please enter a valid email address.';
        return;
    }

    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
        const res = await fetch('https://kuroflow-license-server.onrender.com/trial', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok) {
            msg.style.display = 'block';
            msg.style.color = '#6edd9e';
            msg.textContent = `✅ Trial key sent to ${email}! Check your inbox (and spam).`;

            // Fuerza mostrar toast inmediatamente
            setTimeout(() => {
                const toast = document.getElementById('social-proof-toast');
                document.getElementById('toast-user').textContent = email.split('@')[0].capitalize() || "Trader";
                document.getElementById('toast-action').innerHTML = `requested a 7-day trial <span style="opacity:0.65">• just now</span>`;
                document.getElementById('toast-flag').src = "https://flagcdn.com/w40/us.png";
                document.getElementById('toast-flag').style.display = 'block';
                toast.style.display = 'flex';
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>{toast.style.display='none';},600); }, 7000);
            }, 600);

            document.getElementById('trial-form').style.display = 'none';
        } else {
            throw new Error(data.error || "Try again");
        }
    } catch (e) {
        msg.style.display = 'block';
        msg.style.color = '#ed6e6e';
        msg.textContent = 'Connection error. Please try again.';
    } finally {
        btn.textContent = 'Get Trial Key →';
        btn.disabled = false;
    }
}
</script>
